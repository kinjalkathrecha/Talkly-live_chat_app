{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-5">
            <div class="card card-premium border-0 shadow-lg overflow-hidden">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="d-inline-block p-3 rounded-circle mb-3"
                            style="background: rgba(99, 102, 241, 0.1);">
                            <span style="font-size: 2rem;">🚀</span>
                        </div>
                        <h2 class="fw-bold">Ready to Talk?</h2>
                        <p class="text-muted">Enter a room name below to join the conversation in real-time.</p>
                    </div>

                    <div class="mb-4">
                        <label for="room-name-input"
                            class="form-label small fw-semibold text-uppercase tracking-wider">Room Identifier</label>
                        <input id="room-name-input" type="text"
                            class="form-control form-control-lg border-light-subtle shadow-sm"
                            style="border-radius: 0.75rem;">
                    </div>

                    <button id="room-name-submit" class="btn btn-primary btn-lg w-100 py-3" type="button"
                        style="border-radius: 0.75rem;">
                        Join Room
                    </button>

                    
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const input = document.querySelector('#room-name-input');
    input.focus();

    // Add subtle animation on focus
    input.onfocus = () => {
        input.parentElement.closest('.card-premium').style.transform = 'scale(1.01)';
        input.parentElement.closest('.card-premium').style.transition = 'transform 0.3s ease';
    };
    input.onblur = () => {
        input.parentElement.closest('.card-premium').style.transform = 'scale(1)';
    };

    input.onkeyup = (e) => {
        if (e.key === 'Enter') document.querySelector('#room-name-submit').click();
    };

    document.querySelector('#room-name-submit').onclick = () => {
        const roomName = input.value.trim();
        if (roomName) {
            // Add a brief loading state
            document.querySelector('#room-name-submit').innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Joining...';
            document.querySelector('#room-name-submit').disabled = true;

            setTimeout(() => {
                window.location.pathname = '/chat/' + roomName + '/';
            }, 400);
        }
    };
</script>
{% endblock content %}
