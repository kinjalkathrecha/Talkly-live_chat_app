<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talkly | Real-time Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
        }

        .navbar-brand {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-white bg-white border-bottom sticky-top mb-4 py-3">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">💬 TALKLY</a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="dropdown" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <span class="small text-muted me-1">Signed in as </span>
                        <span class="fw-bold text-primary small">{{ user.username }}</span>
                    </li>
                    <li class="nav-item">
                        <form action="{% url 'logout' %}" method="post" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">Logout</button>
                        </form>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a href="{% url 'login' %}" class="btn btn-sm btn-link text-decoration-none text-muted">Login</a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'signup' %}" class="btn btn-sm btn-primary rounded-pill px-4">Sign Up</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Global Toast Notification Container -->
    <div aria-live="polite" aria-atomic="true" class="position-relative">
        <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055;" id="toast-container">
            <!-- Toasts will be injected dynamically here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% if user.is_authenticated %}
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const ws_scheme = window.location.protocol === "https:" ? "wss" : "ws";
            const notificationSocket = new WebSocket(
                ws_scheme + "://" + window.location.host + "/ws/notifications/"
            );

            notificationSocket.onmessage = function(e) {
                const data = JSON.parse(e.data);
                if (data.type === 'notification') {
                    const currentPath = window.location.pathname;
                    if (currentPath.includes(`/chat/${data.room_name}/`)) {
                        return;
                    }

                    showToastNotification(data.sender, data.message, data.room_name);
                }
            };

            notificationSocket.onclose = function(e) {
                console.error('Notification socket closed unexpectedly');
            };

            function showToastNotification(sender, message, roomName) {
                const toastContainer = document.getElementById('toast-container');
                const toastId = 'toast-' + Date.now();
                
                const toastHTML = `
                    <div id="${toastId}" class="toast shadow-lg border-0 rounded-4 mb-2" role="alert" aria-live="assertive" aria-atomic="true" style="cursor: pointer;">
                        <div class="toast-header border-bottom-0 rounded-top-4 bg-white" onclick="window.location.href='/chat/${roomName}/'">
                            <strong class="me-auto text-primary d-flex align-items-center">
                                <i class="bi bi-chat-dots-fill me-2"></i> ${sender}
                            </strong>
                            <small class="text-muted">Just now</small>
                            <button type="button" class="btn-close shadow-none" data-bs-dismiss="toast" aria-label="Close" onclick="event.stopPropagation();"></button>
                        </div>
                        <div class="toast-body bg-light rounded-bottom-4 text-truncate" onclick="window.location.href='/chat/${roomName}/'">
                            ${message}
                        </div>
                    </div>
                `;
                
                toastContainer.insertAdjacentHTML('beforeend', toastHTML);
                const toastElement = document.getElementById(toastId);
                const toast = new bootstrap.Toast(toastElement, { autohide: true, delay: 5000 });
                toast.show();

                // Play simple notification sound
                try {
                    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                    audio.volume = 0.5;
                    audio.play().catch(e => console.log("Audio play prevented by browser policy"));
                } catch(e) {}

                // Remove from DOM after it hides
                toastElement.addEventListener('hidden.bs.toast', function () {
                    toastElement.remove();
                });
            }
        });
    </script>
    {% endif %}

</body>
</html>
