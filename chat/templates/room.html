{% extends 'base.html' %}

{% block content %}
<style>
    .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 120px);
        max-width: 900px;
        margin: 0 auto;
    }

    #chat-log {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        background: #f1f5f9;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        border-radius: 1rem 1rem 0 0;
        scroll-behavior: smooth;
    }

    /* Speech Bubble Styles */
    .message {
        max-width: 80%;
        padding: 0.75rem 1rem;
        border-radius: 1.125rem;
        position: relative;
        font-size: 0.9375rem;
        line-height: 1.5;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        word-wrap: break-word;
        animation: messageFadeIn 0.3s ease-out;
    }

    @keyframes messageFadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Message from others */
    .message.received {
        align-self: flex-start;
        background: white;
        color: var(--text-main);
        border-bottom-left-radius: 0.25rem;
        border: 1px solid #e2e8f0;
    }

    /* Message from me */
    .message.sent {
        align-self: flex-end;
        background: var(--primary-gradient);
        color: white;
        border-bottom-right-radius: 0.25rem;
    }

    .chat-footer {
        background: white;
        padding: 1.25rem;
        border-radius: 0 0 1rem 1rem;
        border: 1px solid #e2e8f0;
        border-top: none;
    }

    .input-grp-premium {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 2rem;
        padding: 0.25rem 0.25rem 0.25rem 1.25rem;
        display: flex;
        align-items: center;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-grp-premium:focus-within {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .chat-input {
        flex: 1;
        border: none;
        background: transparent;
        padding: 0.5rem 0;
        outline: none;
        color: var(--text-main);
    }

    .send-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: 0.5rem;
    }

    .room-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.5rem;
    }
</style>

<div class="container">
    <div class="chat-container">
        <div class="room-header px-2">
            <div>
                <h5 class="mb-0 fw-bold">{{ room_name }}</h5>
                <span class="small text-muted" id="connection-status"><span class="text-warning">●</span>
                    Connecting...</span>
            </div>
            <a href={% url 'index' %} class="btn btn-sm btn-outline-secondary rounded-pill px-3">Leave Room</a>
        </div>

        <div id="chat-log">
            <div class="text-center my-4">
                <span class="badge bg-white text-muted shadow-sm px-3 py-2 fw-normal"
                    style="border: 1px solid #e2e8f0;">
                    Encryption active. Be respectful in {{ room_name }}.
                </span>
            </div>
        </div>

        <div class="chat-footer shadow-sm">
            <div class="input-grp-premium">
                <input id="chat-message-input" type="text" class="chat-input" placeholder="Aa" autocomplete="off">
                <button id="chat-message-submit" class="btn btn-primary send-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

{{ room_name|json_script:"room-name" }}

<script>
    const roomName = JSON.parse(document.getElementById('room-name').textContent);
    const chatLog = document.getElementById("chat-log");
    const statusEl = document.getElementById("connection-status");
    let myChannelName = null;

    // Determine WebSocket scheme based on current protocol
    const ws_scheme = window.location.protocol === "https:" ? "wss" : "ws";
    const socket = new WebSocket(
        ws_scheme + "://" + window.location.host + "/ws/chat/" + roomName + "/"
    );

    function scrollToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    socket.onmessage = function (e) {
        const data = JSON.parse(e.data);

        if (data.type === 'connection_established') {
            myChannelName = data.channel_name;
            statusEl.innerHTML = '<span class="text-success">●</span> Live Connection';
            return;
        }

        if (data.type === 'chat_message') {
            const messageDiv = document.createElement('div');
            // Compare sender channel with our own
            const isMe = data.sender_channel_name === myChannelName;
            messageDiv.className = 'message ' + (isMe ? 'sent' : 'received');
            messageDiv.innerText = data.message;

            chatLog.appendChild(messageDiv);
            scrollToBottom();
        }
    };

    socket.onclose = function (e) {
        statusEl.innerHTML = '<span class="text-danger">●</span> Disconnected';
        console.error('Chat socket closed unexpectedly');
    };

    document.getElementById("chat-message-input").focus();
    document.getElementById("chat-message-input").onkeyup = function (e) {
        if (e.key === 'Enter') {
            document.getElementById("chat-message-submit").click();
        }
    };

    document.getElementById("chat-message-submit").onclick = function () {
        const input = document.getElementById("chat-message-input");
        const message = input.value.trim();

        if (message === "" || !myChannelName) return;

        socket.send(JSON.stringify({
            "message": message
        }));

        input.value = "";
    };
</script>
{% endblock %}
